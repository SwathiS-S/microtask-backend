version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.0
  http: ^1.1.0
  razorpay_flutter: ^1.4.1
  file_picker: ^8.0.0
