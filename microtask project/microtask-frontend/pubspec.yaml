  cached_network_image: ^3.3.0 # ← ADD for profile images 
  shimmer: ^3.0.0             # ← ADD for loading skeletons 
  fluttertoast: ^8.2.4        # ← ADD for toast messages 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
