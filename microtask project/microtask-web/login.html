<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TaskNest Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --bg-dark: #0b0b0e;
            --sidebar-bg: #141418;
            --content-bg: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --text-light: #ffffff;
            --border: #e5e7eb;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            --brand: #1e3a5f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 440px;
            padding: 40px;
            border: 1px solid var(--border);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo h1 {
            color: var(--brand);
            font-size: 28px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .logo p {
            color: var(--text-muted);
            font-size: 15px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-main);
            font-weight: 600;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.2s;
            background: #f8fbff;
            color: var(--text-main);
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            background: #fff;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.2);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(37, 99, 235, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .auth-toggle {
            text-align: center;
            margin-top: 24px;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
        }

        .auth-toggle a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
            margin-left: 4px;
        }

        .auth-toggle a:hover {
            text-decoration: underline;
        }

        .message {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 500;
            text-align: center;
        }

        .message.error {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fee2e2;
        }

        .icon {
            width: 32px;
            height: 32px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 32px 24px;
            }
        }
    </style>
</head>
<body>
    <!-- SVG Symbols -->
    <svg xmlns="http://www.w3.org/2000/svg" style="position:absolute; width:0; height:0; overflow:hidden;">
        <symbol id="logo-new" viewBox="0 0 24 24">
            <defs>
                <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#ff8a65;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#ff5722;stop-opacity:1" />
                </linearGradient>
            </defs>
            <path fill="#E0E0E0" d="M6,2H18c1.1,0,2,0.9,2,2v16c0,1.1-0.9,2-2,2H6c-1.1,0-2-0.9-2-2V4C4,2.9,4.9,2,6,2z"/>
            <path fill="#F5F5F5" d="M6,3h12v14H6V3z"/>
            <path fill="url(#grad1)" d="M9.9,15.6l-3.5-3.5c-0.4-0.4-0.4-1,0-1.4s1-0.4,1.4,0l2.8,2.8l6.3-6.3c0.4-0.4,1-0.4,1.4,0s0.4,1,0,1.4L11.3,15.6C10.9,16,10.3,16,9.9,15.6z"/>
            <rect x="8" y="7" width="8" height="2" fill="#BDBDBD"/>
            <rect x="8" y="10" width="5" height="2" fill="#BDBDBD"/>
        </symbol>
    </svg>

    <div class="container">
        <a href="/" class="logo" style="text-decoration: none; display: block;">
            <h1>
                <svg class="icon"><use href="#logo-new"/></svg>
                Task<span style="color: var(--primary);">Nest</span>
            </h1>
            <p>Complete micro tasks & earn rewards</p>
        </a>

        <div id="loginMessage"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="loginEmail">Email Address</label>
                <input type="email" id="loginEmail" placeholder="your@email.com" required>
            </div>

            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" placeholder="••••••••" required>
            </div>

            <button type="submit" class="submit-btn" id="loginBtn">Continue</button>
        </form>

        <div class="auth-toggle">
            New here? <a href="/#auth">Create an account</a>
        </div>
    </div>

    <script>
        const API_URL = 'https://microtask-backend-bc7z.onrender.com/api'; // Primary API
        const LOCAL_API_URL = 'http://localhost:5000/api'; // Fallback for local dev

        async function tryLogin(email, password) {
            const urls = [API_URL, LOCAL_API_URL];
            let lastError = null;

            for (const url of urls) {
                try {
                    const response = await fetch(`${url}/users/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });

                    const data = await response.json();

                    if (response.ok && data.success) {
                        return { success: true, data };
                    } else {
                        return { success: false, message: data.message };
                    }
                } catch (error) {
                    console.error(`Error with ${url}:`, error);
                    lastError = error;
                }
            }
            throw lastError || new Error('All API endpoints failed');
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');
            const messageDiv = document.getElementById('loginMessage');

            btn.disabled = true;
            btn.textContent = 'Logging in...';
            if (messageDiv) messageDiv.innerHTML = '';

            try {
                const result = await tryLogin(email, password);

                if (result.success) {
                    const data = result.data;
                    // Store user data in localStorage
                    localStorage.setItem('currentUser', JSON.stringify({
                        userId: data.userId,
                        email: data.email,
                        name: data.name,
                        role: data.role,
                        wallet: data.wallet
                    }));
                    
                    // Redirect to dashboard
                    window.location.href = '/';
                } else {
                    if (messageDiv) {
                        messageDiv.className = 'message error';
                        messageDiv.textContent = result.message || 'Login failed. Please check your credentials.';
                    } else {
                        alert(result.message || 'Login failed. Please check your credentials.');
                    }
                }
            } catch (error) {
                console.error('Login error:', error);
                if (messageDiv) {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = 'Network error. Please ensure the backend is running.';
                } else {
                    alert('Network error. Please ensure the backend is running.');
                }
            } finally {
                btn.disabled = false;
                btn.textContent = 'Continue';
            }
        });
    </script>
</body>
</html>
