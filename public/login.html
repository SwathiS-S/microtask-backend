<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TaskNest Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #050505;
            --bg-surface: #0f0f12;
            --border-subtle: #1f1f25;
            --primary-accent: #3b82f6;
            --text-primary: #ffffff;
            --text-muted: #8e8e93;
            --text-dim: #5c5c63;
            --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: var(--bg-deep);
            color: var(--text-primary);
            overflow: hidden;
        }

        .main-container {
            display: grid;
            grid-template-columns: 42% 58%;
            width: 100%;
            height: 100vh;
        }

        /* --- LEFT SIDE: FORM --- */
        .form-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            background-color: var(--bg-deep);
            position: relative;
            z-index: 10;
        }

        .login-content {
            width: 100%;
            max-width: 400px;
            animation: fadeIn 0.8s var(--transition-smooth);
        }

        .brand-logo {
            margin-bottom: 48px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: var(--primary-accent);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
        }

        .brand-name {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.04em;
            color: #fff;
        }

        .header-title {
            margin-bottom: 40px;
        }

        .header-title h2 {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 12px;
            line-height: 1.1;
        }

        .header-title p {
            color: var(--text-muted);
            font-size: 16px;
        }

        .input-group {
            margin-bottom: 24px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-dim);
            margin-bottom: 10px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 16px 18px;
            background-color: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 14px;
            color: #fff;
            font-size: 16px;
            transition: var(--transition-smooth);
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--primary-accent);
            background-color: #121217;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background-color: #fff;
            color: #000;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition-smooth);
            margin-top: 16px;
        }

        .submit-btn:hover {
            background-color: #f0f0f0;
            transform: translateY(-2px);
        }

        .footer-link {
            margin-top: 40px;
            text-align: center;
            font-size: 15px;
            color: var(--text-dim);
        }

        .footer-link a {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            margin-left: 6px;
        }

        /* --- RIGHT SIDE: PURE CSS VISUAL --- */
        .visual-section {
            position: relative;
            background-color: #000;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-left: 1px solid var(--border-subtle);
        }

        /* Abstract CSS Background Shapes */
        .abstract-bg {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 70% 30%, rgba(59, 130, 246, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 30% 70%, rgba(37, 99, 235, 0.05) 0%, transparent 50%);
        }

        .grid-pattern {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(var(--border-subtle) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.3;
        }

        .floating-card {
            position: relative;
            width: 440px;
            padding: 60px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            z-index: 2;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5);
            animation: float 6s ease-in-out infinite;
        }

        .badge {
            display: inline-block;
            padding: 8px 16px;
            background: rgba(59, 130, 246, 0.1);
            color: var(--primary-accent);
            border-radius: 100px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 24px;
        }

        .hero-text {
            font-size: 48px;
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.04em;
            margin-bottom: 24px;
        }

        .hero-text span {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: 700;
            color: var(--primary-accent);
        }

        .hero-desc {
            font-size: 17px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        /* Decorative Glow */
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary-accent);
            filter: blur(150px);
            opacity: 0.1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 1024px) {
            .main-container { grid-template-columns: 100%; }
            .visual-section { display: none; }
            .form-section { padding: 40px 20px; }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- Left Section -->
        <section class="form-section">
            <div class="login-content">
                <a href="/" class="brand-logo" style="text-decoration: none;">
                    <div class="logo-icon">📋</div>
                    <span class="brand-name">TaskNest</span>
                </a>

                <div class="header-title">
                    <h2>Welcome back</h2>
                    <p>Enter your details to access your workspace.</p>
                </div>

                <form onsubmit="return false;">
                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <div class="input-wrapper">
                            <input type="email" id="email" value="swathis2205@gmail.com" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" value="............" required>
                        </div>
                    </div>

                    <button type="submit" class="submit-btn">Continue</button>
                </form>

                <div class="footer-link">
                    New here? <a href="#">Create an account</a>
                </div>
            </div>
        </section>

        <!-- Right Section: Pure CSS Design (No External Images) -->
        <section class="visual-section">
            <div class="abstract-bg"></div>
            <div class="grid-pattern"></div>
            <div class="glow"></div>
            
            <div class="floating-card">
                <span class="badge">TaskNest Premium</span>
                <h1 class="hero-text">
                    Master your <span>productivity</span> flow.
                </h1>
                <p class="hero-desc">
                    A minimal, distraction-free environment designed for peak performance and meaningful progress.
                </p>
            </div>
        </section>
    </div>
</body>
</html>
