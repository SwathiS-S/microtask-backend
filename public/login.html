<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TaskNest</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --bg-dark: #0b0b0e;
            --sidebar-bg: #141418;
            --content-bg: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --text-light: #ffffff;
            --border: #e5e7eb;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            --brand: #1e3a5f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #050505;
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        .auth-split {
            width: 100%;
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            background: #0f0f12;
            overflow: hidden;
            box-shadow: none;
            margin: 0;
        }

        .auth-left {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px;
            background: #141418;
        }

        .auth-card {
            width: 100%;
            max-width: 440px;
            margin: 0 auto;
            background: transparent;
            padding: 0;
            border: none;
            box-shadow: none;
        }

        .logo {
            margin-bottom: 40px;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo p {
            color: #8e8e93;
            font-size: 16px;
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #5c5c63;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-group input {
            width: 100%;
            padding: 16px;
            background: #1c1c21;
            border: 1px solid #2c2c34;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            border-color: #3b82f6;
            background: #25252b;
            outline: none;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(37, 99, 235, 0.4);
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .auth-toggle {
            margin-top: 32px;
            color: #5c5c63;
            font-size: 15px;
        }

        .auth-toggle a {
            color: #3b82f6;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            margin-left: 4px;
        }

        .auth-toggle a:hover {
            text-decoration: underline;
        }

        .auth-right {
            position: relative;
            background: #0a0a0c;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .auth-right::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(225deg, rgba(59, 130, 246, 0.1) 0%, transparent 100%);
            z-index: 1;
        }

        .illustration-container {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
        }

        .illustration-img {
            max-width: 85%;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            margin-bottom: 40px;
            filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.2));
        }

        .illustration-text {
            font-size: 32px;
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.02em;
            max-width: 400px;
            line-height: 1.2;
        }

        .illustration-text span {
            color: #3b82f6;
        }

        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 500;
        }

        .message.error {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .icon {
            width: 32px;
            height: 32px;
        }

        @media (max-width: 1024px) {
            .auth-split {
                grid-template-columns: 1fr;
                max-width: 100%;
                border-radius: 0;
            }
            .auth-right {
                order: -1;
                min-height: 300px;
            }
            .auth-left {
                padding: 40px;
            }
            .illustration-text {
                font-size: 24px;
            }
        }
        @media (max-width: 480px) {
            .auth-left {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <svg xmlns="http://www.w3.org/2000/svg" style="position:absolute; width:0; height:0; overflow:hidden;">
        <symbol id="logo-new" viewBox="0 0 24 24">
            <defs>
                <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#ff8a65;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#ff5722;stop-opacity:1" />
                </linearGradient>
            </defs>
            <path fill="#E0E0E0" d="M6,2H18c1.1,0,2,0.9,2,2v16c0,1.1-0.9,2-2,2H6c-1.1,0-2-0.9-2-2V4C4,2.9,4.9,2,6,2z"/>
            <path fill="#F5F5F5" d="M6,3h12v14H6V3z"/>
            <path fill="url(#grad1)" d="M9.9,15.6l-3.5-3.5c-0.4-0.4-0.4-1,0-1.4s1-0.4,1.4,0l2.8,2.8l6.3-6.3c0.4-0.4,1-0.4,1.4,0s0.4,1,0,1.4L11.3,15.6C10.9,16,10.3,16,9.9,15.6z"/>
            <rect x="8" y="7" width="8" height="2" fill="#BDBDBD"/>
            <rect x="8" y="10" width="5" height="2" fill="#BDBDBD"/>
        </symbol>
    </svg>

    <div class="auth-split">
        <div class="auth-left">
            <div class="auth-card">
                <form id="loginForm">
                    <div class="logo">
                        <h1><svg class="icon"><use href="#logo-new"/></svg>Task <span style="color: var(--primary);">Nest</span></h1>
                        <p>Find tasks and earn rewards</p>
                    </div>
                    <div id="loginMessage"></div>
                    <div class="form-group">
                        <label for="loginEmail">Email</label>
                        <input type="email" id="loginEmail" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" placeholder="Enter password" required>
                    </div>
                    <button type="submit" class="submit-btn" id="loginBtn">Login</button>
                    <div class="auth-toggle">
                        Don't have an account? <a href="/#auth">Register</a>
                    </div>
                </form>
            </div>
        </div>
        <div class="auth-right">
            <div class="illustration-container">
                <img src="https://images.unsplash.com/photo-1522071820081-009f0129c71c?q=80&w=2070&auto=format&fit=crop" alt="Task Management Illustration" class="illustration-img">
                <h2 class="illustration-text">
                    Find tasks and <br><span>earn rewards.</span>
                </h2>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');
            const messageDiv = document.getElementById('loginMessage');

            btn.disabled = true;
            btn.textContent = 'Logging in...';
            if (messageDiv) messageDiv.innerHTML = '';

            try {
                const response = await fetch(`${API_URL}/users/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Store user data in localStorage
                    localStorage.setItem('currentUser', JSON.stringify({
                        userId: data.userId,
                        email: data.email,
                        name: data.name,
                        role: data.role,
                        wallet: data.wallet != null ? data.wallet : 0,
                        bankDetails: data.bankDetails || null
                    }));
                    
                    // Redirect to dashboard
                    window.location.href = '/';
                } else {
                    if (messageDiv) {
                        messageDiv.className = 'message error';
                        messageDiv.textContent = data.message || 'Login failed. Please check your credentials.';
                    } else {
                        alert(data.message || 'Login failed. Please check your credentials.');
                    }
                }
            } catch (error) {
                console.error('Login error:', error);
                if (messageDiv) {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = 'Network error. Please ensure the backend is running.';
                } else {
                    alert('Network error. Please try again.');
                }
            } finally {
                btn.disabled = false;
                btn.textContent = 'Login';
            }
        });
    </script>
</body>
</html>
