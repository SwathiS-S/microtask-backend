<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>TaskNest — Welcome</title>
    <style>
        html,body{height:100%;margin:0;font-family:Segoe UI, Tahoma, Geneva, Verdana, sans-serif}
        .bg{
            background:
              radial-gradient(900px 600px at 10% 5%, rgba(36,88,247,0.25), transparent 60%),
              radial-gradient(900px 600px at 90% 95%, rgba(26,59,224,0.25), transparent 60%),
              linear-gradient(135deg, #0b5cff 0%, #1a3be0 100%);
            height:100%;
            display:flex;
            align-items:center;
            justify-content:center;
        }
        .card{
            width:520px;
            max-width:92%;
            background:#fff;
            border-radius:20px;
            box-shadow:0 30px 60px rgba(11,92,255,0.20);
            padding:32px;
            position:relative;
            transition:opacity .25s ease;
        }
        .brand{display:flex;align-items:center;gap:14px;justify-content:center;margin-bottom:4px}
        .brand h1{color:#2458F7;margin:0;font-size:30px;font-weight:800;letter-spacing:.3px}
        .brand p{margin:6px 0 0 0;color:#64748b;font-size:14px;text-align:center}
        .logo{width:60px;height:60px;border-radius:12px;background:linear-gradient(90deg,#7aa7ff,#5473ff);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:22px}
        .splash{position:relative; width:100%; height:100%; pointer-events:none}
        .brand-circle{
            position:absolute; left:50%; transform:translateX(-50%);
            bottom:18%;
            width:120px; height:120px; border-radius:9999px;
            background:#1139d9; box-shadow:0 18px 40px rgba(11,92,255,.30);
            display:flex; align-items:center; justify-content:center; color:#fff; font-weight:900; font-size:34px; letter-spacing:.5px;
        }
        .dots{
            position:absolute; bottom:18%;
            height:96px; width:40%;
            max-width:600px; border-radius:16px;
            background:
              radial-gradient(circle,#7aa7ff 36%, transparent 38%) 0 0/22px 22px,
              radial-gradient(circle,#5473ff 36%, transparent 38%) 11px 33px/22px 22px,
              radial-gradient(circle,#2ec27e 36%, transparent 38%) 22px 66px/22px 22px;
            background-color:transparent;
            opacity:.85;
        }
        .dots-left{left:6%}
        .dots-right{right:6%}
    </style>
</head>
<body>
    <div class="bg">
        <iframe id="appFrame" src="index.html" frameborder="0" style="position:fixed;inset:0;width:100%;height:100%;border:0;"></iframe>

        <div id="splash" class="splash" style="position:relative;z-index:40;">
            <div class="dots dots-left"></div>
            <div class="brand-circle">TN</div>
            <div class="dots dots-right"></div>
        </div>
    </div>

    <script>
        const splash=document.getElementById('splash');
        setTimeout(()=>{ if(splash){ splash.style.opacity='0'; setTimeout(()=>{ splash.style.display='none'; },280); } },1500);
    </script>
</body>
</html>
