<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>TaskNest Admin • Sign In</title>
  <style>
    :root {
      --bg: #f6f7fb; --panel: #ffffff; --text: #0f172a; --muted: #64748b;
      --brand: #1e3a5f; --border: #e5eaf1; --shadow: 0 8px 24px rgba(16,24,40,.08);
      --success: #16a34a; --danger: #dc2626;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body { margin: 0; font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: var(--bg); color: var(--text); display: grid; place-items: center; }
    .card { width: 360px; max-width: 92vw; background: var(--panel); border: 1px solid var(--border); border-radius: 16px; box-shadow: var(--shadow); }
    .card-header { padding: 18px; border-bottom: 1px solid var(--border); display: grid; gap: 6px; text-align: center; }
    .brand { font-weight: 800; letter-spacing: .3px; }
    .subtitle { font-size: 13px; color: var(--muted); }
    .card-body { padding: 18px; display: grid; gap: 12px; }
    .field { display: grid; gap: 6px; }
    label { font-size: 12px; color: var(--muted); }
    input { height: 42px; padding: 0 12px; border: 1px solid var(--border); border-radius: 10px; outline: none; font-size: 14px; }
    input::placeholder { color: var(--muted); }
    .btn { height: 42px; border: 0; border-radius: 10px; background: var(--brand); color: #fff; font-weight: 700; cursor: pointer; }
    .hint { font-size: 12px; color: var(--muted); text-align: center; }
    .error { display: none; background: #fee2e2; color: #991b1b; padding: 10px 12px; border-radius: 10px; font-size: 13px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <div class="brand">TaskNest Admin</div>
      <div class="subtitle">Sign in to your admin account</div>
    </div>
    <div class="card-body">
      <div id="errorBox" class="error"></div>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="admin@example.com" autocomplete="username">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Enter password" autocomplete="current-password">
      </div>
      <button class="btn" onclick="login()">Sign in</button>
      <div class="hint">Only accounts with role set to admin can sign in.</div>
    </div>
  </div>
  <script>
    const API_URL = 'https://microtask-backend-bc7z.onrender.com/api';
    function showError(msg) {
      const box = document.getElementById('errorBox');
      box.textContent = msg || 'Login failed';
      box.style.display = 'block';
    }
    async function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) { showError('Enter email and password'); return; }
      try {
        const r = await fetch(`${API_URL}/users/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const d = await r.json();
        if (!r.ok || !d.success) { showError(d.message || 'Invalid credentials'); return; }
        if (d.role !== 'admin') { showError('Only admin can sign in'); return; }
        localStorage.setItem('adminUser', JSON.stringify(d));
        location.href = 'admin.html';
      } catch (e) {
        showError(e.message);
      }
    }
    (function bootstrap() {
      const raw = localStorage.getItem('adminUser');
      if (raw) {
        try {
          const u = JSON.parse(raw);
          if (u && u.role === 'admin' && u.userId) location.href = 'admin.html';
        } catch (_) {}
      }
    })();
  </script>
</body>
</html>
